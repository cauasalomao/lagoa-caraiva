<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dobra 2, V2 · Foto banner + texto centrado</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css?v=20260525">
  <style>
    body { background: var(--paper); margin: 0; }

    .dobra2 {
      padding: clamp(4rem, 8vw, 7rem) 0 clamp(5rem, 10vw, 8rem);
    }
    .dobra2__media {
      width: 100%;
      aspect-ratio: 21 / 9;
      overflow: hidden;
      margin-bottom: clamp(3rem, 6vw, 5rem);
    }
    .dobra2__media img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .dobra2__copy {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem;
      text-align: center;
    }
    .dobra2__eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 2.5rem;
    }
    .dobra2__title {
      font-family: var(--font-display);
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.875rem, 1.3rem + 2vw, 3.25rem);
      line-height: 1.22;
      color: var(--ink);
      margin-bottom: 2.5rem;
      letter-spacing: 0.005em;
    }
    .dobra2__text {
      font-size: 1.0625rem;
      line-height: 1.8;
      color: var(--ink-soft);
      max-width: 520px;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .dobra2__media { aspect-ratio: 4 / 3; }
    }
  </style>
</head>
<body>
  <section class="dobra2">
    <figure class="dobra2__media">
      <img src="../assets/img/barcos-aerea.jpg" alt="Barcos no rio Caraíva ao entardecer">
    </figure>
    <div class="dobra2__copy">
      <p class="dobra2__eyebrow">Uma experiência que transcende o tempo</p>
      <h2 class="dobra2__title">Lagoa Caraíva é mais do que uma Pousada.</h2>
      <p class="dobra2__text">É uma vila que ainda existe, na costa do descobrimento. Um lugar onde o tempo passa no ritmo da maré e cada pôr do sol é uma promessa de retorno.</p>
    </div>
  </section>
</body>
</html>
