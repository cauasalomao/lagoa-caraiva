<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trio Casamentos, V3 · Carrossel snap com peek</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css?v=20260525">
  <style>
    body{background:var(--paper);margin:0;padding:2rem 0}
    .label{text-align:center;font-family:var(--font-body);font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:2rem}

    .photo-trio{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(.5rem,1vw,.75rem);max-width:1200px;margin:0 auto;padding:0 var(--gutter)}
    .photo-trio__item{overflow:hidden;border-radius:4px;aspect-ratio:3/4}
    .photo-trio__item img{width:100%;height:100%;object-fit:cover;display:block}

    @media(max-width:700px){
      .photo-trio{
        display:flex;
        grid-template-columns:none;
        gap:.75rem;
        padding:0;
        padding-left:var(--gutter);
        overflow-x:auto;
        scroll-snap-type:x mandatory;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
        scroll-padding-left:var(--gutter);
      }
      .photo-trio::-webkit-scrollbar{display:none}
      .photo-trio__item{
        flex:0 0 80vw;
        aspect-ratio:3/4;
        scroll-snap-align:start;
      }
      .photo-trio__item:last-child{
        margin-right:var(--gutter);
      }
      .swipe-hint{
        display:flex;align-items:center;justify-content:center;gap:.4rem;
        margin-top:1rem;
        font-family:var(--font-body);font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;
        color:rgba(42,33,24,.4);
      }
      .swipe-hint svg{animation:nudge 1.8s ease-in-out infinite}
      @keyframes nudge{0%,100%{transform:translateX(0);opacity:.55}50%{transform:translateX(5px);opacity:1}}
    }
    .swipe-hint{display:none}
  </style>
</head>
<body>
  <p class="label">V3 · carrossel com peek + swipe hint</p>
  <div class="photo-trio">
    <div class="photo-trio__item"><img src="../assets/img/evento-decor1.jpg" alt=""></div>
    <div class="photo-trio__item"><img src="../assets/img/evento-decor3.jpg" alt=""></div>
    <div class="photo-trio__item"><img src="../assets/img/evento-decor2.jpg" alt=""></div>
  </div>
  <p class="swipe-hint" aria-hidden="true">
    <span>arraste</span>
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </p>
</body>
</html>
