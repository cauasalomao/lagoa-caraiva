<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Variação 1, Mosaico Assimétrico</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css?v=20260520b">
  <style>
    body { background: var(--green-deep); }

    .entres-gallery {
      min-height: 100vh;
      padding: clamp(5rem, 10vw, 8rem) 0 clamp(4rem, 8vw, 6rem);
      background: var(--green-deep);
      color: var(--sand);
    }
    .entres-gallery__inner {
      max-width: var(--container);
      margin: 0 auto;
      padding: 0 var(--gutter);
    }
    .entres-gallery__head {
      text-align: center;
      margin-bottom: clamp(3rem, 6vw, 5rem);
    }
    .entres-gallery__head .eyebrow {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(237, 227, 210, 0.55);
      margin-bottom: 1.25rem;
    }
    .entres-gallery__head h2 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(2rem, 1.4rem + 2.5vw, 3.5rem);
      line-height: 1.1;
      letter-spacing: -0.012em;
      color: var(--sand);
      margin: 0;
    }
    .entres-gallery__head h2 em {
      font-style: italic;
      font-weight: 300;
    }
    .entres-gallery__head p {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 1.3vw, 1.25rem);
      color: rgba(237, 227, 210, 0.7);
      max-width: 48ch;
      margin: 1.25rem auto 0;
      line-height: 1.6;
    }

    /* --- Mosaico assimétrico --- */
    .mosaic {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: minmax(120px, 1fr);
      gap: 6px;
    }
    .mosaic__item {
      position: relative;
      overflow: hidden;
      border-radius: 3px;
    }
    .mosaic__item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s var(--ease);
    }
    .mosaic__item:hover img {
      transform: scale(1.05);
    }
    .mosaic__item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(31, 51, 40, 0.12);
      transition: background 0.4s var(--ease);
      pointer-events: none;
    }
    .mosaic__item:hover::after {
      background: transparent;
    }

    /* Grid placement, asymmetric mosaic */
    .mosaic__item:nth-child(1) { grid-column: 1 / 8;  grid-row: 1 / 3; }
    .mosaic__item:nth-child(2) { grid-column: 8 / 13; grid-row: 1 / 2; }
    .mosaic__item:nth-child(3) { grid-column: 8 / 13; grid-row: 2 / 3; }
    .mosaic__item:nth-child(4) { grid-column: 1 / 5;  grid-row: 3 / 5; }
    .mosaic__item:nth-child(5) { grid-column: 5 / 9;  grid-row: 3 / 4; }
    .mosaic__item:nth-child(6) { grid-column: 9 / 13; grid-row: 3 / 5; }
    .mosaic__item:nth-child(7) { grid-column: 5 / 9;  grid-row: 4 / 5; }
    .mosaic__item:nth-child(8) { grid-column: 1 / 7;  grid-row: 5 / 7; }
    .mosaic__item:nth-child(9) { grid-column: 7 / 13; grid-row: 5 / 7; }

    @media (max-width: 700px) {
      .mosaic {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 180px;
        gap: 4px;
      }
      .mosaic__item:nth-child(n) {
        grid-column: auto;
        grid-row: auto;
      }
      .mosaic__item:nth-child(1) { grid-column: 1 / -1; }
      .mosaic__item:nth-child(8) { grid-column: 1 / -1; }
    }

    /* --- CTA --- */
    .entres-gallery__cta {
      text-align: center;
      margin-top: clamp(2.5rem, 5vw, 4rem);
    }
    .entres-gallery__cta a {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-body);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--sand);
      text-decoration: none;
      padding: 1rem 2.2rem;
      border: 1px solid rgba(237, 227, 210, 0.35);
      border-radius: 999px;
      transition: background 0.35s var(--ease), border-color 0.35s var(--ease), transform 0.35s var(--ease);
    }
    .entres-gallery__cta a:hover {
      background: rgba(237, 227, 210, 0.1);
      border-color: rgba(237, 227, 210, 0.6);
      transform: translateY(-2px);
    }
    .entres-gallery__cta a svg {
      width: 14px; height: 14px;
      transition: transform 0.35s var(--ease);
    }
    .entres-gallery__cta a:hover svg {
      transform: translateX(3px);
    }

    .tag {
      position: fixed; top: 1rem; left: 1rem; z-index: 100;
      background: rgba(31,51,40,0.9); color: var(--sand);
      padding: 0.5rem 1rem; border-radius: 4px;
      font-family: var(--font-body); font-size: 0.7rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      backdrop-filter: blur(8px);
    }
    .tag strong { font-weight: 600; }
    .nav-variacoes {
      position: fixed; top: 1rem; right: 1rem; z-index: 100;
      display: flex; gap: 0.5rem;
    }
    .nav-variacoes a {
      background: rgba(31,51,40,0.9); color: var(--sand);
      padding: 0.5rem 0.9rem; border-radius: 4px;
      font-family: var(--font-body); font-size: 0.65rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      text-decoration: none; backdrop-filter: blur(8px);
      border: 1px solid rgba(237,227,210,0.15);
      transition: border-color 0.3s, background 0.3s;
    }
    .nav-variacoes a:hover, .nav-variacoes a.active {
      border-color: rgba(237,227,210,0.5);
      background: rgba(31,51,40,1);
    }
  </style>
</head>
<body>

  <div class="tag"><strong>V1</strong>, Mosaico Assimétrico</div>
  <nav class="nav-variacoes">
    <a href="v1.html" class="active">V1</a>
    <a href="v2.html">V2</a>
    <a href="v3.html">V3</a>
  </nav>

  <section class="entres-gallery">
    <div class="entres-gallery__inner">
      <div class="entres-gallery__head">
        <p class="eyebrow">Os entres</p>
        <h2>O lugar onde <em>as memórias ficam guardadas.</em></h2>
        <p>Onde o hóspede está quando não está no quarto e não está numa atividade. Aqui mora a metade do que se leva da viagem.</p>
      </div>

      <div class="mosaic">
        <figure class="mosaic__item">
          <img src="/assets/img/rede-bangalo.jpg" alt="Rede branca na varanda de um bangalô entre a mata" loading="lazy">
        </figure>
        <figure class="mosaic__item">
          <img src="/assets/img/barcos-aerea.jpg" alt="Barcos no rio Caraíva ao entardecer" loading="lazy">
        </figure>
        <figure class="mosaic__item">
          <img src="/assets/img/cafe-da-manha.jpg" alt="Café da manhã servido à mesa" loading="lazy">
        </figure>
        <figure class="mosaic__item">
          <img src="/assets/img/yoga.jpg" alt="Yoga em sala de madeira com luz natural" loading="lazy">
        </figure>
        <figure class="mosaic__item">
          <img src="/assets/img/vila-aerea.jpg" alt="Vista aérea da vila de Caraíva" loading="lazy">
        </figure>
        <figure class="mosaic__item">
          <img src="/assets/img/caminhada-praia.jpg" alt="Caminho de areia até a praia" loading="lazy">
        </figure>
        <figure class="mosaic__item">
          <img src="/assets/img/canoa.jpg" alt="Canoa no rio Caraíva" loading="lazy">
        </figure>
        <figure class="mosaic__item">
          <img src="/assets/img/bangalo-amarelo.jpg" alt="Bangalô Amarelo entre árvores" loading="lazy">
        </figure>
        <figure class="mosaic__item">
          <img src="/assets/img/massagem.jpg" alt="Massagem ao ar livre" loading="lazy">
        </figure>
      </div>

      <div class="entres-gallery__cta">
        <a href="/galeria/index.html">
          Ver galeria completa
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>
  </section>

</body>
</html>
